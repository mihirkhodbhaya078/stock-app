<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-container">
      <!-- Header -->
      <header class="app-header">
        <h1 class="app-title">My Tasks</h1>
        <p class="task-counter" id="task-counter" aria-live="polite">0 items left</p>
      </header>

      <!-- Add task form -->
      <form class="add-task-form" id="add-task-form" aria-label="Add a new task">
        <input
          type="text"
          class="add-task-input"
          id="add-task-input"
          placeholder="What needs to be done?"
          aria-label="New task text"
          autocomplete="off"
          maxlength="200"
        />
        <button type="submit" class="add-task-btn" aria-label="Add task">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </form>

      <!-- Filter tabs -->
      <nav class="filter-tabs" aria-label="Filter tasks">
        <button class="filter-btn active" data-filter="all" aria-pressed="true">All</button>
        <button class="filter-btn" data-filter="active" aria-pressed="false">Active</button>
        <button class="filter-btn" data-filter="completed" aria-pressed="false">Completed</button>
      </nav>

      <!-- Task list -->
      <ul class="task-list" id="task-list" role="list" aria-label="Task list"></ul>

      <!-- Empty state -->
      <div class="empty-state" id="empty-state" aria-live="polite">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
          stroke-linejoin="round" aria-hidden="true">
          <path d="M9 11l3 3L22 4"></path>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
        </svg>
        <p>No tasks here!</p>
        <span>Add a task above to get started.</span>
      </div>

      <!-- Footer actions -->
      <footer class="app-footer" id="app-footer">
        <button class="clear-completed-btn" id="clear-completed-btn" aria-label="Clear all completed tasks">
          Clear completed
        </button>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
